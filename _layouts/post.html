---
layout: default
---
<div class="post">

  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <p class="post-meta">{{ page.date | date: "%b %-d, %Y" }}{% if page.author %} • {{ page.author }}{% endif %}</p>
  </header>

  <article class="post-content">
    {{ content }}
  </article>

  <p><a href="http://creativecommons.org/licenses/by/3.0/cn/deed.en_US"><img src="http://i.creativecommons.org/l/by/3.0/cn/88x31.png" alt="Creative Commons License"></a></p>

  <p>This work is licensed under a <a href="http://creativecommons.org/licenses/by/3.0/cn/deed.en_US">Creative Commons Attribution 3.0 China Mainland License.</a></p>

</div>
